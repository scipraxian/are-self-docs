name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [learn-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Checkout both repos ──────────────────────────────────
      - name: Checkout are-self-docs
        uses: actions/checkout@v4

      - name: Checkout are-self-learn
        uses: actions/checkout@v4
        with:
          repository: scipraxian/are-self-learn
          path: _learn

      # ── 2. Node setup ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. Build docs (root site) ──────────────────────────────
      - name: Install docs dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

      # ── 4. Build learn (sub-site at /learn/) ───────────────────
      - name: Install learn dependencies
        working-directory: _learn/site
        run: npm ci

      - name: Build learn
        working-directory: _learn/site
        run: npm run build

      # ── 5. Merge: copy learn build into docs build/learn/ ──────
      - name: Merge learn into docs
        run: |
          mkdir -p build/learn
          cp -r _learn/site/build/* build/learn/

      # ── 6. Upload combined artifact ────────────────────────────
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
